parameters:
  - name: scriptsPath
    type: string
    default: "auto_quant"
  - name: requestJson
    type: string
    default: ""
  - name: hardware
    type: string
    default: "gpu"

steps:
  - script: |
      uv pip install -U huggingface_hub
      git config --global credential.helper store
      hf auth login --token $(HUGGINGFACE_TOKEN) --add-to-git-credential
    displayName: Login to huggingface

  - script: |
      npm install -g openclaw@2026.3.24
      uv pip install --no-cache-dir openclaw==2026.3.20
      cp -r openclaw_config/ /root/.openclaw/

      cd ${BUILD_SOURCESDIRECTORY}/.azure-pipelines/scripts
      python sync_minimax_key.py --token=$(MINIMAX_KEY) --path=/root/.openclaw/agents/main/agent/auth-profiles.json
    displayName: Set Up OpenClaw


  - script: |
      cd ${BUILD_SOURCESDIRECTORY}/.azure-pipelines/scripts
      python update_config.py --output ${BUILD_SOURCESDIRECTORY}/${{ parameters.scriptsPath }}/auto_quant/config.env
    env:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      HF_TOKENS: $(HUGGINGFACE_TOKEN)
      MINIMAX_API_KEY: $(MINIMAX_KEY)
      GIT_TOKEN: $(GIT_TOKEN)
    displayName: Update Config

  - script: |
      set -xe
      cd ${BUILD_SOURCESDIRECTORY}/${{ parameters.scriptsPath }}
      bash auto.sh ${BUILD_SOURCESDIRECTORY}/requests/${{ parameters.requestJson }}
    displayName: Eval

