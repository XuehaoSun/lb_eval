parameters:
  - name: scriptsPath
    type: string
    default: "auto_quant"
  - name: requestJson
    type: string
    default: ""
  - name: hardware
    type: string
    default: "gpu"

steps:
  - script: |
      uv pip install openclaw==2026.3.20
      uv pip install -U huggingface_hub
      cp -r openclaw_config/ /root/.openclaw/

      cd ${BUILD_SOURCESDIRECTORY}/.azure-pipelines/scripts
      python sync_minimax_key.py --token=$(MINIMAX_KEY) --path=/root/.openclaw/agents/main/agent/auth-profiles.json
    displayName: Set Up OpenClaw

  - script: |
      cd ${BUILD_SOURCESDIRECTORY}/.azure-pipelines/scripts
      python update_config_env.py \
        --output ${BUILD_SOURCESDIRECTORY}/${{ parameters.scriptsPath }}/config.env \
        --set HTTP_PROXY="" \
        --set HTTPS_PROXY="" \
        --set HF_TOKENS=$(HUGGINGFACE_TOKEN) \
        --set MINIMAX_API_KEY=$(MINIMAX_KEY) \
        --set GIT_TOKEN=$(GIT_TOKEN)
    displayName: Update Config

  - script: |
      set -xe
      cd ${BUILD_SOURCESDIRECTORY}/${{ parameters.scriptsPath }}
      bash auto.sh ${BUILD_SOURCESDIRECTORY}/requests/${{ parameters.requestJson }}
    displayName: Eval
