parameters:
  - name: scriptsPath
    type: string
    default: "auto_quant"
  - name: requestJson
    type: string
    default: ""
  - name: hardware
    type: string
    default: "gpu"

steps:
  - script: |
      uv pip install -U huggingface_hub
      git config --global credential.helper store
      hf auth login --token $(HF_TOKEN_MODELS) --add-to-git-credential
    displayName: Login to huggingface

  - script: |
      npm install -g openclaw@2026.3.24
      uv pip install --no-cache-dir openclaw==2026.3.20
      cp -r openclaw_config/ /root/.openclaw/

      cd ${BUILD_SOURCESDIRECTORY}/.azure-pipelines/scripts
      python sync_minimax_key.py --token=$(MINIMAX_KEY) --path=/root/.openclaw/agents/main/agent/auth-profiles.json
    displayName: Set Up OpenClaw

  - script: |
      set -xe
      cd ${BUILD_SOURCESDIRECTORY}/${{ parameters.scriptsPath }}
      ls
      cd ${BUILD_SOURCESDIRECTORY}/auto_quant
      ls
      echo ${{ parameters.requestJson }}
      bash auto.sh ${BUILD_SOURCESDIRECTORY}/requests/Qwen/Qwen3-0.6B_quant_request_False_W4A16_4bit_int4.json
    displayName: Eval

