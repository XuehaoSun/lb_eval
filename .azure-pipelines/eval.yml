trigger: none
pr: none

parameters:
  - name: runName
    type: string
    default: "lb-eval"

name: ${{ parameters.runName }}

pool:
  vmImage: "ubuntu-latest"

variables:
  - name: POOL_NAME
    value: "LB_RunPod_GPU_Pool"
  - name: LOCAL_POOL_NAME
    value: "LB_GPU"
  - name: AGENT_NAME
    value: "lb-agent-$(Build.BuildId)"

# ====================================================================
# Stage 1: Start_Pod — create RunPod instance (runpod only), write status
# ====================================================================
stages:
  - stage: Start_Pod
    jobs:
      - job: Start_Pod_Job
        displayName: "Launch Pod & Run CUDA Tests"
        timeoutInMinutes: 60
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            inputs:
              targetType: "inline"
              script: |
                pip install requests huggingface_hub

          - task: Bash@3
            displayName: "Create RunPod Instance"
            name: create_runpod
            condition: eq(variables['AGENT_TYPE'], 'runpod')
            inputs:
              targetType: "inline"
              script: |
                export PYTHONUNBUFFERED=1
                cd ${BUILD_SOURCESDIRECTORY}
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action "create" \
                  --api_key "$(RUNPOD_API_KEY)" \
                  --name "lb-$(Build.BuildId)" \
                  --container_disk_size "$(CONTAINER_DISK_SIZE)" \
                  --gpu_id "$(GPU_ID)" \
                  --gpu_count "$(GPU_COUNT)" \
                  --env AZP_URL="$(System.CollectionUri)" AZP_TOKEN="$(AZP_DEVOPS_PAT)" AZP_POOL="$(POOL_NAME)" AZP_AGENT_NAME="$(AGENT_NAME)"

          - template: template/git-status-template.yml
            parameters:
              status: "Waiting"
              requestJson: "$(REQUEST_JSON)"

          - task: Bash@3
            displayName: "Wait for Pod to be Online"
            name: wait_for_pod
            condition: eq(variables['AGENT_TYPE'], 'runpod')
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action wait \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Wait for Agent to be Online"
            name: wait_for_agent
            condition: eq(variables['AGENT_TYPE'], 'runpod')
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/azure_agent.py \
                  --action wait \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"

          - template: template/git-status-template.yml
            parameters:
              status: "Running"
              requestJson: "$(REQUEST_JSON)"

# ====================================================================
# Stage 2: Eval — run auto.sh on the GPU pod
# ====================================================================
  - stage: Eval
    displayName: Evaluation
    dependsOn: [Start_Pod]
    condition: eq(dependencies.Start_Pod.result, 'Succeeded')
    jobs:
      - job: Eval_RunPod
        displayName: "Eval on RunPod Agent"
        condition: eq(variables['AGENT_TYPE'], 'runpod')
        timeoutInMinutes: 2880
        pool:
          name: "$(POOL_NAME)"
          demands: Agent.Name -equals lb-agent-$(Build.BuildId)
        steps:
          - template: template/model-template.yml

      - job: Eval_Local
        displayName: "Eval on Local Agent"
        condition: eq(variables['AGENT_TYPE'], 'local')
        timeoutInMinutes: 2880
        pool:
          name: "$(LOCAL_POOL_NAME)"
        steps:
          - template: template/model-template.yml

# ====================================================================
# Stage 3: Cleanup — terminate pod, deregister agent, push results
# ====================================================================
  - stage: Cleanup_Verification
    displayName: "Verify Pod Cleanup"
    dependsOn:
      - Start_Pod
      - Eval
    condition: always()
    jobs:
      - job: Verify_Cleanup
        variables:
          evalRunpodResult: $[ stageDependencies.Eval.Eval_RunPod.result ]
          evalLocalResult: $[ stageDependencies.Eval.Eval_Local.result ]
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                pip install requests huggingface_hub

          - task: Bash@3
            displayName: "Terminate RunPod Instance"
            condition: and(always(), eq(variables['AGENT_TYPE'], 'runpod'))
            inputs:
              targetType: "inline"
              script: |
                echo "Terminating Pod: lb-$(Build.BuildId)"
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action terminate \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Deregister Agent from Pool"
            condition: and(always(), eq(variables['AGENT_TYPE'], 'runpod'))
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/azure_agent.py \
                  --action deregister \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"

          # Safety net: write-back final status based on Eval stage result
          - task: Bash@3
            displayName: "Write Status (Finished)"
            condition: or(eq(variables.evalRunpodResult, 'Succeeded'), eq(variables.evalLocalResult, 'Succeeded'))
            inputs:
              filePath: .azure-pipelines/scripts/git_update.sh
            name: gitUpdateStatusFinished
            env:
              requestJson: $(REQUEST_JSON)
              commitMessage: "Commit from Azure DevOps update Status Finished"
              status: "Finished"
              TOKEN: $(TOKEN)
              HUGGINGFACE_TOKEN: $(HUGGINGFACE_TOKEN)

          - task: Bash@3
            displayName: "Write Status (Failed)"
            condition: and(ne(variables.evalRunpodResult, 'Succeeded'), ne(variables.evalLocalResult, 'Succeeded'))
            inputs:
              filePath: .azure-pipelines/scripts/git_update.sh
            name: gitUpdateStatusFailed
            env:
              requestJson: $(REQUEST_JSON)
              commitMessage: "Commit from Azure DevOps update Status Failed"
              status: "Failed"
              TOKEN: $(TOKEN)
              HUGGINGFACE_TOKEN: $(HUGGINGFACE_TOKEN)
