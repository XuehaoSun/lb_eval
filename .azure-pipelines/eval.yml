trigger:
  branches:
    include:
      - main
  paths:
    include:
      - .azure-pipelines
      - requests
      - evaluation

pool:
  vmImage: "ubuntu-latest"

variables:
  - name: POOL_NAME
    value: "LB_RunPod_GPU_Pool"
  - name: AGENT_NAME
    value: "lb-agent-$(Build.BuildId)"

stages:
  - stage: Start_Pod
    jobs:
      - job: Start_Pod_Job
        displayName: "Launch Pod & Run CUDA Tests"
        timeoutInMinutes: 60
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            inputs:
              targetType: "inline"
              script: |
                pip install requests

          - bash: |
              cd requests
              # request_json=$(find . -name *.json)
              request_json="Qwen/Qwen3-0.6B_quant_request_False_W4A16_4bit_int4.json"
              hardware=$(grep "quant_gpu_type" ${request_json} | cut -d'"' -f4)
              scripts=$(grep "script" ${request_json} | cut -d'"' -f4)
              echo "##vso[task.setvariable variable=hardware;isOutput=true]${hardware}"
              echo "##vso[task.setvariable variable=scripts;isOutput=true]${scripts}"
              echo "##vso[task.setvariable variable=request_json;isOutput=true]${request_json}"
            name: setVarFromJsonFileValue

          - bash: |
              echo "Hardware: $(setVarFromJsonFileValue.hardware)"
              echo "Scripts: $(setVarFromJsonFileValue.scripts)"
              echo "Request Json: $(setVarFromJsonFileValue.request_json)"

          - task: Bash@3
            displayName: "Create RunPod Instance"
            name: create_runpod
            inputs:
              targetType: "inline"
              script: |
                export PYTHONUNBUFFERED=1
                cd ${BUILD_SOURCESDIRECTORY}
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action create \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)" \
                  --container_disk_size "100" \
                  --env AZP_URL=$(System.CollectionUri) AZP_TOKEN=$(AZP_DEVOPS_PAT) AZP_POOL=$(POOL_NAME) AZP_AGENT_NAME="$(AGENT_NAME)" \
                  --gpu_id "$(setVarFromJsonFileValue.hardware)"

          - template: template/git-status-template.yml
            parameters:
              status: "Waiting"
              requestJson: "$(setVarFromJsonFileValue.request_json)"

          - task: Bash@3
            displayName: "Wait for Pod to be Online"
            name: wait_for_pod
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action wait \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Wait for Agent to be Online"
            name: wait_for_agent
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/azure_agent.py \
                  --action wait \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"

          - template: template/git-status-template.yml
            parameters:
              status: "Running"
              requestJson: "$(setVarFromJsonFileValue.request_json)"

  - stage: Eval
    displayName: Evaluation
    variables:
      hardware: $[stageDependencies.Start_Pod.Start_Pod_Job.outputs['setVarFromJsonFileValue.hardware']]
      scripts: $[stageDependencies.Start_Pod.Start_Pod_Job.outputs['setVarFromJsonFileValue.scripts']]
      request_json: $[stageDependencies.Start_Pod.Start_Pod_Job.outputs['setVarFromJsonFileValue.request_json']]
    pool: "$(POOL_NAME)"
    dependsOn: [Start_Pod]
    jobs:
      - job: Eval
        timeoutInMinutes: 2880
        steps:
          - checkout: self
            clean: true
            displayName: "Checkout Repo"
            fetchDepth: 100

          - task: Bash@3
            inputs:
              targetType: "inline"
              script: |
                echo "Running on GPU"
                nvidia-smi
                lscpu
            displayName: "Verify Hardware"

          - template: template/model-template.yml
            parameters:
              scriptsPath: "$(scripts)"
              requestJson: "$(request_json)"
              hardware: "$(hardware)"

  - stage: Cleanup_Verification
    displayName: "Verify Pod Cleanup"
    variables:
      hardware: $[stageDependencies.Start_Pod.Start_Pod_Job.outputs['setVarFromJsonFileValue.hardware']]
      scripts: $[stageDependencies.Start_Pod.Start_Pod_Job.outputs['setVarFromJsonFileValue.scripts']]
      request_json: $[stageDependencies.Start_Pod.Start_Pod_Job.outputs['setVarFromJsonFileValue.request_json']]
    dependsOn:
      - Eval
    condition: always()
    jobs:
      - job: Verify_Cleanup
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                pip install requests

          - task: Bash@3
            displayName: "Terminate RunPod Instance"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                echo "Terminating Pod: lb-$(Build.BuildId)"
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action terminate \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Deregister Agent from Pool"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/azure_agent.py \
                  --action deregister \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"

          - template: template/git-status-template.yml
            parameters:
              status: "Finished"
              requestJson: "$(request_json)"

          - task: Bash@3
            inputs:
              filePath: .azure-pipelines/scripts/git_update.sh
            name: gitUpdateResults
            env:
              requestJson: "$(request_json)"
              commitMessage: "Commit from Azure DevOps update Results"
              status: ""
              TOKEN: $(TOKEN)
              HUGGINGFACE_TOKEN: $(HUGGINGFACE_TOKEN)
