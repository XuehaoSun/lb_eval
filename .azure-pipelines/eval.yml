trigger: none
pr: none

parameters:
  - name: runName
    type: string
    default: "lb-eval"

name: ${{ parameters.runName }}_$(Build.BuildId)

pool:
  vmImage: "ubuntu-latest"

variables:
  - name: POOL_NAME
    value: "LB_RunPod_GPU_Pool"
  - name: AGENT_NAME
    value: "lb-agent-$(Build.BuildId)"

# ====================================================================
# Stage 1: Start_Pod — create RunPod instance, register agent
# ====================================================================
stages:
  - stage: Start_Pod
    jobs:
      - job: Start_Pod_Job
        displayName: "Launch Pod & Run CUDA Tests"
        timeoutInMinutes: 60
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            inputs:
              targetType: "inline"
              script: |
                pip install requests

          - task: Bash@3
            displayName: "Create RunPod Instance"
            name: create_runpod
            inputs:
              targetType: "inline"
              script: |
                export PYTHONUNBUFFERED=1
                cd ${BUILD_SOURCESDIRECTORY}
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action create \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)" \
                  --container_disk_size "200" \
                  --gpu_id $(GPU_ID) \
                  --gpu_count 1 \
                  --env AZP_URL=$(System.CollectionUri) AZP_TOKEN=$(AZP_DEVOPS_PAT) AZP_POOL=$(POOL_NAME) AZP_AGENT_NAME="$(AGENT_NAME)"

          - template: template/git-status-template.yml
            parameters:
              status: "Waiting"
              requestJson: "$(REQUEST_JSON)"

          - task: Bash@3
            displayName: "Wait for Pod to be Online"
            name: wait_for_pod
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action wait \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Wait for Agent to be Online"
            name: wait_for_agent
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/azure_agent.py \
                  --action wait \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"

          - template: template/git-status-template.yml
            parameters:
              status: "Running"
              requestJson: "$(REQUEST_JSON)"

# ====================================================================
# Stage 2: Eval — run auto.sh on the GPU pod
# ====================================================================
  - stage: Eval
    displayName: Evaluation
    pool: "$(POOL_NAME)"
    dependsOn: [Start_Pod]
    jobs:
      - job: Eval
        timeoutInMinutes: 2880
        steps:
          - checkout: self
            clean: true
            displayName: "Checkout Repo"
            fetchDepth: 100

          - task: Bash@3
            inputs:
              targetType: "inline"
              script: |
                echo "Running on GPU"
                nvidia-smi
                lscpu
            displayName: "Verify Hardware"

          - template: template/model-template.yml

# ====================================================================
# Stage 3: Cleanup — terminate pod, deregister agent, push results
# ====================================================================
  - stage: Cleanup_Verification
    displayName: "Verify Pod Cleanup"
    dependsOn:
      - Start_Pod
      - Eval
    condition: always()
    jobs:
      - job: Verify_Cleanup
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                pip install requests

          - task: Bash@3
            displayName: "Terminate RunPod Instance"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                echo "Terminating Pod: lb-$(Build.BuildId)"
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/runpod_manager.py \
                  --action terminate \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "lb-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Deregister Agent from Pool"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/azure_agent.py \
                  --action deregister \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"

          - task: Bash@3
            inputs:
              filePath: .azure-pipelines/scripts/git_update.sh
            name: gitUpdateResults
            env:
              requestJson: $(REQUEST_JSON)
              commitMessage: "Commit from Azure DevOps update Results"
              status: ""
              TOKEN: $(TOKEN)
              HUGGINGFACE_TOKEN: $(HUGGINGFACE_TOKEN)
